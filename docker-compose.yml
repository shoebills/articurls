services:

  api:
    build: .
    command: uvicorn src.app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: 
      - .env.docker
    restart: always
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    restart: always
    env_file:
      - .env.docker
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    restart: always

  celery_worker:
    build: .
    command: celery -A src.app.workers.celery_app.celery worker --loglevel=info
    env_file:
      - .env.docker
    restart: always
    depends_on:
      - redis
      - postgres

  celery_beat:
    build: .
    command: celery -A src.app.workers.celery_app.celery beat --loglevel=info
    env_file:
      - .env.docker
    restart: always
    depends_on:
      - redis
      - postgres

volumes:
  postgres_data: