<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset Password</title>
    <style>
      .pw-wrap {
        position: relative;
        margin-top: 6px;
        max-width: 320px;
      }
      #new_password {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 44px 10px 10px;
        font-size: 16px;
        border: 1px solid #ccc;
        border-radius: 6px;
      }
      #toggle_pw {
        position: absolute;
        right: 4px;
        top: 50%;
        transform: translateY(-50%);
        width: 36px;
        height: 36px;
        border: none;
        background: transparent;
        cursor: pointer;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #64748b;
      }
      #toggle_pw:hover {
        background: #f1f5f9;
        color: #0f172a;
      }
      #toggle_pw:focus-visible {
        outline: 2px solid #3b82f6;
        outline-offset: 2px;
      }
    </style>
  </head>

  <body style="font-family: Arial, sans-serif; padding: 24px;">
    <h2>Reset your password</h2>

    <form id="f">
      <input type="hidden" id="token" value="{{TOKEN}}" />
      <div style="margin: 12px 0;">
        <label for="new_password">New password</label><br />
        <div class="pw-wrap">
          <input type="password" id="new_password" required autocomplete="new-password" />
          <button type="button" id="toggle_pw" aria-label="Show password" aria-pressed="false">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>
      </div>

      <button type="submit">Update Password</button>
    </form>

    <pre id="out" style="margin-top: 16px; white-space: pre-wrap;"></pre>

    <script>
      (function () {
        const input = document.getElementById("new_password");
        const btn = document.getElementById("toggle_pw");
        const iconEye =
          '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>';
        const iconEyeOff =
          '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.43 13.43 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>';

        btn.addEventListener("click", function () {
          const shown = input.type === "text";
          if (shown) {
            input.type = "password";
            btn.innerHTML = iconEye;
            btn.setAttribute("aria-label", "Show password");
            btn.setAttribute("aria-pressed", "false");
          } else {
            input.type = "text";
            btn.innerHTML = iconEyeOff;
            btn.setAttribute("aria-label", "Hide password");
            btn.setAttribute("aria-pressed", "true");
          }
        });
      })();

      const form = document.getElementById("f");
      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const token = document.getElementById("token").value;
        const new_password = document.getElementById("new_password").value;

        const res = await fetch("/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, new_password }),
        });

        let data = {};
        try {
          data = await res.json();
        } catch (_) {}

        document.getElementById("out").textContent = JSON.stringify({ status: res.status, data }, null, 2);
      });
    </script>
  </body>
</html>
