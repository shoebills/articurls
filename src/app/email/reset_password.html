<!DOCTYPE html>
<html>
  <body style="margin:0;padding:0;background:#f6f6f6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f6f6f6;padding:40px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" style="max-width:520px;background:#fff;border-radius:8px;padding:32px;text-align:left;">
            <tr>
              <td>
                <p style="margin:0 0 16px;font-size:20px;color:#111;font-weight:700;">
                  Reset your Articurls password
                </p>

                <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333;">
                  We received a request to reset your password.
                </p>

                <p style="margin:0 0 24px;font-size:14px;line-height:1.6;color:#111;">
                  <a href="{{ reset_url }}" style="display:inline-block;background:#111;color:#fff;text-decoration:none;font-size:14px;font-weight:600;padding:12px 20px;border-radius:6px;">
                    Reset password
                  </a>
                </p>

                <p style="margin:0 0 10px;font-size:13px;line-height:1.6;color:#666;">
                  If the button doesn’t work, open this link:
                </p>
                <p style="margin:0;font-size:12px;line-height:1.6;color:#999;word-break:break-all;">
                  <a href="{{ reset_url }}">{{ reset_url }}</a>
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
