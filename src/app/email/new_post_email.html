<!DOCTYPE html>
<html>
<body style="margin:0; padding:0; background:#f4f4f4; font-family: Arial, Helvetica, sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#f4f4f4; padding:40px 0;">
<tr>
<td align="center">

<table width="600" cellpadding="0" cellspacing="0" border="0" style="background:#ffffff; border:1px solid #e5e5e5; border-radius:8px; padding:40px;">

<tr>
<td style="font-size:12px; color:#888888; letter-spacing:1px; text-transform:uppercase; padding-bottom:20px;">
New Article
</td>
</tr>

<tr>
<td style="font-size:28px; font-weight:bold; color:#111111; line-height:1.3; padding-bottom:20px;">
{{ post_title }}
</td>
</tr>

<tr>
<td style="font-size:16px; color:#555555; line-height:1.6; padding-bottom:30px;">
A new article has just been published on the blog. Click below to read the full post.
</td>
</tr>

<tr>
<td align="left" style="padding-bottom:35px;">
<a href="{{ post_url }}" 
style="display:inline-block; padding:14px 28px; background:#111111; color:#ffffff; text-decoration:none; font-size:14px; border-radius:4px;">
Read the article
</a>
</td>
</tr>

<tr>
<td style="border-top:1px solid #eeeeee; padding-top:20px; font-size:14px; color:#777777;">
Thanks for subscribing to <strong style="color:#111111;">{{ blog_name }}</strong>
</td>
</tr>

</table>

<table width="600" cellpadding="0" cellspacing="0" border="0" style="margin-top:16px;">
<tr>
<td align="center" style="font-size:12px; color:#999999;">
You are receiving this email because you subscribed to updates.
</td>
</tr>
</table>

</td>
</tr>
</table>

</body>
</html>
