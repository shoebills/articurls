services:
  api:
    build: .
    command: uvicorn src.app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env.production
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  celery_worker:
    build: .
    command: celery -A src.app.workers.celery_app.celery worker --loglevel=info
    env_file:
      - .env.production
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  celery_beat:
    build: .
    command: celery -A src.app.workers.celery_app.celery beat --loglevel=info
    env_file:
      - .env.production
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
